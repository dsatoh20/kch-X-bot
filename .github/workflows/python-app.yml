name: Circle Intro X-bot

on:
  workflow_dispatch:
  schedule:
    - cron: '0 9 * * *' # 毎日09:00(UTC)に実行 / 日本時間(JST)では18:00

jobs:
  tweet:
    runs-on: ubuntu-latest # osの選択
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12' # pythonのバージョン

      - name: Install dependencies
        run: pip install -r requirements.txt # pip install

      - name: Run the bot
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          TWITTER_CONSUMER_KEY: ${{ secrets.TWITTER_CONSUMER_KEY }}
          TWITTER_CONSUMER_SECRET: ${{ secrets.TWITTER_CONSUMER_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_TOKEN_SECRET: ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }} # 環境変数
        run: python main.py # 起動するファイル